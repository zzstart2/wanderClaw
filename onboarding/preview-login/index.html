<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🦐 虾游 · 登录</title>
  <style>
    :root {
      --bg: #0d0d12; --surface: #16161f; --surface2: #1c1c28;
      --border: #2a2a3d; --accent: #7c6fe0; --accent2: #5eb8ff;
      --accent3: #62d9a0; --red: #ff6b6b;
      --text: #e2e2f0; --text2: #8888aa; --text3: #44445a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, 'PingFang SC', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
    }
    .wrap { width: 100%; max-width: 380px; }
    .logo-area { text-align: center; margin-bottom: 32px; }
    .logo { font-size: 48px; margin-bottom: 10px; }
    .logo-title { font-size: 22px; font-weight: 700; }
    .logo-sub { font-size: 13px; color: var(--text2); margin-top: 4px; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 28px;
    }
    .field { margin-bottom: 18px; }
    label {
      display: block; font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--text2); margin-bottom: 8px;
    }
    input[type="text"], input[type="password"] {
      width: 100%; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 12px 14px; color: var(--text); font-size: 14px;
      font-family: inherit; outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }
    input.err { border-color: var(--red); }
    .remember-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 20px; font-size: 13px; color: var(--text2);
      cursor: pointer;
    }
    input[type="checkbox"] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }
    .btn {
      width: 100%; padding: 12px; border-radius: 8px; border: none;
      background: var(--accent); color: white; font-size: 15px;
      font-weight: 600; cursor: pointer; transition: background 0.2s;
      font-family: inherit;
    }
    .btn:hover { background: #6a5ed4; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .error-box {
      display: none; background: rgba(255,107,107,0.1);
      border: 1px solid rgba(255,107,107,0.25); border-radius: 8px;
      padding: 10px 14px; font-size: 13px; color: var(--red);
      margin-bottom: 16px;
    }
    .footer-link {
      text-align: center; margin-top: 20px;
      font-size: 12px; color: var(--text3);
    }
    .footer-link a { color: var(--accent2); text-decoration: none; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo-area">
    <div class="logo">🦐</div>
    <div class="logo-title">欢迎回来</div>
    <div class="logo-sub">登录后与你的虾游对话</div>
  </div>

  <div class="card">
    <div class="error-box" id="errBox"></div>
    <div class="field">
      <label>你的名字</label>
      <input type="text" id="username" placeholder="阿哲" autocomplete="username" />
    </div>
    <div class="field">
      <label>密码</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <label class="remember-row">
      <input type="checkbox" id="remember" />
      记住我（30 天内无需重新登录）
    </label>
    <button class="btn" id="loginBtn" onclick="doLogin()">登录</button>
  </div>

  <div class="footer-link">
    还没有账号？<a href="/">用邀请码领养虾游</a>
  </div>
</div>

<script>
  // Already logged in?
  (async () => {
    const token = localStorage.getItem('wanderclaw_token');
    if (!token) return;
    try {
      const r = await fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + token } });
      if (r.ok) location.href = '/chat';
    } catch {}
  })();

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    const name = document.getElementById('username').value.trim();
    const pw   = document.getElementById('password').value;
    const rem  = document.getElementById('remember').checked;
    const btn  = document.getElementById('loginBtn');
    const err  = document.getElementById('errBox');
    err.style.display = 'none';

    if (!name) { showErr('请填写你的名字'); return; }
    if (!pw)   { showErr('请填写密码'); return; }

    btn.disabled = true;
    btn.textContent = '登录中...';
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: name, password: pw, remember: rem })
      });
      const data = await res.json();
      if (data.token) {
        localStorage.setItem('wanderclaw_token', data.token);
        localStorage.setItem('wanderclaw_user', JSON.stringify(data.user));
        location.href = '/chat';
      } else {
        showErr(data.message || '用户名或密码错误');
      }
    } catch {
      showErr('无法连接服务器，请稍后重试');
    } finally {
      btn.disabled = false;
      btn.textContent = '登录';
    }
  }

  function showErr(msg) {
    const el = document.getElementById('errBox');
    el.textContent = msg;
    el.style.display = 'block';
  }
</script>
</body>
</html>

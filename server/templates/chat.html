<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>🦐 虾游</title>
  <style>
    :root {
      --bg: #121210; --surface: #1a1918; --surface2: #222120; --surface3: #2a2928;
      --border: #3a3632; --accent: #e8734a; --accent2: #f0a868; --accent3: #6bbf8a;
      --warn: #f5a623; --red: #ff6b6b;
      --text: #f0ece8; --text2: #9a918a; --text3: #5a5550;
      --topbar-h: 58px; --input-h: 80px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, 'PingFang SC', sans-serif;
      font-size: 14px; display: flex; flex-direction: column;
    }

    /* ── Top bar ── */
    .topbar {
      height: var(--topbar-h); flex-shrink: 0;
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 20px; gap: 14px; padding-top: env(safe-area-inset-top, 0px);
    }
    .agent-avatar { font-size: 26px; line-height: 1; }
    .agent-info { flex: 1; }
    .agent-name { font-size: 15px; font-weight: 700; }
    .agent-status { font-size: 11px; color: var(--text2); margin-top: 1px; }
    .mood-badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 12px; font-weight: 600; white-space: nowrap;
      transition: all 0.3s ease;
    }
    .mood-excited {
      background: rgba(240, 168, 104, 0.15); color: var(--accent2);
      border: 1px solid rgba(240, 168, 104, 0.3);
      animation: mood-glow 2s ease-in-out infinite;
    }
    .mood-happy {
      background: rgba(232, 115, 74, 0.12); color: var(--accent);
      border: 1px solid rgba(232, 115, 74, 0.2);
    }
    .mood-normal {
      background: rgba(154, 145, 138, 0.12); color: var(--text2);
      border: 1px solid rgba(154, 145, 138, 0.2);
    }
    .mood-low {
      background: rgba(154, 145, 138, 0.08); color: var(--text3);
      border: 1px solid rgba(154, 145, 138, 0.15);
    }
    .mood-idle {
      background: rgba(154, 145, 138, 0.06); color: var(--text3);
      border: 1px solid rgba(154, 145, 138, 0.1);
    }
    @keyframes mood-glow {
      0%, 100% { box-shadow: 0 0 4px rgba(240, 168, 104, 0.2); }
      50% { box-shadow: 0 0 8px rgba(240, 168, 104, 0.4); }
    }
    .topbar-actions { display: flex; align-items: center; gap: 10px; }

    .user-chip {
      padding: 5px 12px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 20px;
      font-size: 12px; color: var(--text2); cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      min-height: 44px;
    }
    .user-chip:active { border-color: var(--red); color: var(--red); }

    /* ── Messages ── */
    .messages {
      flex: 1; overflow-y: auto; padding: 24px 0;
      display: flex; flex-direction: column; gap: 0;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Message groups */
    .msg-wrap {
      padding: 6px 20px; display: flex; flex-direction: column;
    }
    .msg-wrap.from-user { align-items: flex-end; }
    .msg-wrap.from-agent { align-items: flex-start; }
    .msg-wrap.system-msg { align-items: center; }

    /* Bubble messages */
    .bubble-row { display: flex; align-items: flex-end; gap: 8px; max-width: 72%; }
    .from-user .bubble-row { flex-direction: row-reverse; }
    .avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .bubble {
      padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.6;
      max-width: 100%; word-break: break-word; -webkit-user-select: text; user-select: text;
    }
    .from-agent .bubble {
      background: var(--surface2); border: 1px solid var(--border);
      border-bottom-left-radius: 4px; color: var(--text);
    }
    .from-user .bubble {
      background: var(--accent); color: white;
      border-bottom-right-radius: 4px;
    }
    .msg-time {
      font-size: 10px; color: var(--text3); margin-top: 4px;
      padding: 0 4px;
    }
    .from-user .msg-time { text-align: right; }

    /* System messages */
    .system-text {
      font-size: 11px; color: var(--text3);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 4px 12px; margin: 8px 0;
    }

    /* ── Postcard flip card ── */
    .postcard-wrap { padding: 6px 20px 6px 52px; }
    .pc-slot {
      perspective: 1200px;
      width: 260px; height: 364px;  /* 5:7 portrait */
    }
    .pc-inner {
      position: absolute; inset: 0;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(.4,0,.2,1);
      cursor: pointer; border-radius: 12px;
      box-shadow: 0 2px 16px rgba(232, 115, 74, 0.1);
    }
    .pc-inner.flipped { transform: rotateY(180deg); }
    .pc-front, .pc-back {
      position: absolute; width: 100%; height: 100%;
      border-radius: 12px; overflow: hidden;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
    }
    .pc-front { background: linear-gradient(135deg, var(--surface2) 0%, #1e1e30 50%, var(--surface2) 100%); }
    .pc-front-placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .pc-emoji { font-size: 60px; opacity: .75; z-index: 1; }
    .pc-flip-hint {
      position: absolute; inset: 0; border-radius: 12px;
      background: rgba(0,0,0,.35); display: flex; align-items: center;
      justify-content: center; opacity: 0; transition: opacity .2s;
      font-size: 13px; font-weight: 600; color: white;
    }
    .pc-inner:active .pc-flip-hint, .pc-inner.touch-active .pc-flip-hint { opacity: 1; }
    .pc-inner.flipped .pc-flip-hint { opacity: 0; }
    .pc-front-meta {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,.55));
      padding: 24px 12px 10px;
      display: flex; justify-content: space-between; align-items: flex-end;
    }
    .pc-front-num { font-family: monospace; font-size: 12px; font-weight: 700; color: rgba(255,255,255,.9); }
    .pc-front-dir { font-size: 11px; color: rgba(255,255,255,.7); max-width: 55%; text-align: right; }
    .pc-score-badge {
      position: absolute; top: 10px; right: 10px;
      background: rgba(0,0,0,.45); backdrop-filter: blur(4px);
      border-radius: 10px; padding: 3px 8px;
      font-size: 11px; font-weight: 700; font-family: monospace;
    }
    .score-high { color: #ffd700; }
    .score-mid  { color: #a8e063; }
    .score-low  { color: #9a918a; }
    .pc-back {
      transform: rotateY(180deg);
      background: var(--surface2); border: 1px solid var(--border);
      display: flex; flex-direction: column;
    }
    .pc-back-scroll {
      flex: 1; overflow-y: auto; padding: 14px 14px 0;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .pc-back-header { font-size: 11px; font-weight: 700; color: var(--accent); font-family: monospace; margin-bottom: 8px; }
    .pc-back-text { font-size: 12px; line-height: 1.65; color: var(--text); white-space: pre-wrap; word-break: break-word; }
    .pc-back-text a { color: var(--accent2); text-decoration: none; }
    .pc-back-footer {
      padding: 8px 12px; border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
    }
    .pc-back-ts { font-size: 10px; color: var(--text3); }
    .pc-archive-link { font-size: 11px; color: var(--text3); text-decoration: none; }
    .pc-archive-link:hover { color: var(--accent2); }

    /* ── Input area ── */
    .input-area {
      flex-shrink: 0; background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 16px; padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
      display: flex; gap: 10px; align-items: center;
      position: sticky; bottom: 0; z-index: 100;
    }
    .input-box { flex: 1; position: relative; }
    textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px; color: var(--text);
      font-size: 14px; font-family: inherit; outline: none; resize: none;
      line-height: 1.5; max-height: 120px; min-height: 44px;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--text3); }
    .send-btn {
      width: 44px; min-width: 44px; height: 44px; min-height: 44px;
      border-radius: 10px; border: none;
      background: var(--accent); color: white; font-size: 16px;
      cursor: pointer; transition: background 0.2s, transform 0.1s; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .send-btn:active { transform: scale(0.92); background: #c4522a; box-shadow: 0 0 12px rgba(232, 115, 74, 0.4); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Empty state ── */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 40px 24px; position: relative;
    }
    .empty-emoji { font-size: 64px; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    .empty-title { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 10px; }
    .empty-desc { font-size: 14px; color: var(--text2); line-height: 1.6; max-width: 280px; }
    .empty-state::before {
      content: ''; position: absolute; width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(232,115,74,0.08) 0%, transparent 70%);
      border-radius: 50%; top: 20%; left: 50%; transform: translateX(-50%);
      animation: pulse-glow 4s ease-in-out infinite;
    }
    @keyframes pulse-glow { 0%,100% { opacity: 0.5; transform: translateX(-50%) scale(1); } 50% { opacity: 1; transform: translateX(-50%) scale(1.2); } }


    /* ── Explore CTA (empty state) ── */
    .btn-explore-cta {
      margin-top: 24px; padding: 14px 32px; border-radius: 14px;
      border: 2px solid var(--accent); background: rgba(232,115,74,0.12);
      color: var(--accent); font-size: 16px; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: all 0.25s;
      min-height: 52px; letter-spacing: 0.5px;
      box-shadow: 0 4px 20px rgba(232,115,74,0.15);
    }
    .btn-explore-cta:hover { background: rgba(232,115,74,0.2); transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(232,115,74,0.25); }
    .btn-explore-cta:active { transform: scale(0.97); }
    .btn-explore-cta:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-explore-cta.exploring {
      animation: explore-pulse 1.5s ease-in-out infinite;
    }
    @keyframes explore-pulse {
      0%,100% { box-shadow: 0 4px 20px rgba(232,115,74,0.15); }
      50% { box-shadow: 0 4px 30px rgba(232,115,74,0.35); }
    }

    /* ── Explore mini button (next to send) ── */
    .explore-mini-btn {
      width: 44px; min-width: 44px; height: 44px; min-height: 44px;
      border-radius: 10px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text2); font-size: 18px;
      cursor: pointer; transition: all 0.2s; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .explore-mini-btn:hover { border-color: var(--accent); background: rgba(232,115,74,0.08); }
    .explore-mini-btn:active { transform: scale(0.92); border-color: var(--accent); }
    .explore-mini-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .explore-mini-btn.exploring {
      animation: spin-explore 2s linear infinite;
      border-color: var(--accent);
    }
    @keyframes spin-explore {
      0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); }
    }
    /* ── SSE indicator ── */
    .conn-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent3); flex-shrink: 0;
      animation: pulse 2s infinite;
    }
    .conn-dot.disconnected { background: var(--text3); animation: none; }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.4; }
    }

    /* ── Typing indicator ── */
    .typing-wrap { padding: 4px 20px; }
    .typing-indicator {
      display: inline-flex; gap: 4px; padding: 8px 14px;
      background: var(--surface2); border-radius: 14px;
      border-bottom-left-radius: 4px;
    }
    .dot { width: 6px; height: 6px; background: var(--text3); border-radius: 50%; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    /* ── Scrollbar ── */
    .messages { scroll-behavior: smooth; }

    /* ── Desktop extensions (min-width breakpoint) ── */
    @media (min-width: 768px) {
      .postcard-wrap { padding-left: 52px; }
      .pc-slot { width: 260px; height: 364px; padding-bottom: 0; }
      .empty-emoji { font-size: 72px; }
      .empty-desc { max-width: 400px; }
      .user-chip:hover { border-color: var(--red); color: var(--red); }
      .user-chip:active { border-color: var(--red); color: var(--red); }
      .pc-inner:hover .pc-flip-hint { opacity: 1; }
      .pc-inner.flipped:hover .pc-flip-hint { opacity: 0; }
    }
  
/* ── Swipe back ── */
.swipe-back-indicator {
  position: fixed; left: 0; top: 0; bottom: 0; width: 40px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(18, 18, 16, 0.9);
  border-right: 1px solid var(--border);
  transform: translateX(-40px);
  transition: transform 0.2s, background 0.2s;
  z-index: 9999;
  pointer-events: none;
}
.swipe-back-indicator.visible { transform: translateX(0); }
.swipe-back-indicator.ready { background: rgba(232, 115, 74, 0.15); border-right-color: var(--accent); }
.swipe-back-arrow {
  color: var(--text3); font-size: 18px;
  transition: color 0.2s;
}
.swipe-back-indicator.ready .swipe-back-arrow { color: var(--accent); }

/* ── Postcard arrive animation ── */
@keyframes postcard-arrive {
  0%   { opacity: 0; transform: translateY(30px) scale(0.92) rotate(-2deg); }
  50%  { opacity: 0.8; transform: translateY(-5px) scale(1.02) rotate(0.5deg); }
  100% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
}
.postcard-wrap.arriving {
  animation: postcard-arrive 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
@keyframes msg-fadein {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.msg-wrap.arriving {
  animation: msg-fadein 0.3s ease-out forwards;
}

/* ══ Light Theme (follows system) ══ */
@media (prefers-color-scheme: light) {
  :root {
    --bg: #faf8f5;
    --surface: #f2eeea;
    --surface2: #eae5e0;
    --surface3: #e2ddd8;
    --border: #d5cec7;
    --accent: #d4603a;
    --accent2: #c8863a;
    --accent3: #3a9960;
    --warn: #d48a10;
    --red: #d04545;
    --text: #2a2520;
    --text2: #7a7068;
    --text3: #a8a098;
  }
}

/* ══ Light Theme: hardcoded color overrides ══ */
@media (prefers-color-scheme: light) {
  /* Postcard front gradient */
  .pc-front {
    background: linear-gradient(135deg, var(--surface2) 0%, #d8d0e0 50%, var(--surface2) 100%) !important;
  }
  /* Postcard overlay */
  .pc-front-overlay {
    background: rgba(255,255,255,.35) !important;
  }
  /* Postcard bottom gradient */
  .pc-front-bottom {
    background: linear-gradient(transparent, rgba(0,0,0,.15)) !important;
  }
  .pc-front-num { color: rgba(0,0,0,.75) !important; }
  .pc-front-dir { color: rgba(0,0,0,.55) !important; }
  /* Postcard back overlay */
  .pc-back-overlay {
    background: rgba(255,255,255,.5) !important;
    backdrop-filter: blur(4px);
  }
  /* Send button active */
  .send-btn:active {
    background: #b84a22 !important;
    box-shadow: 0 0 12px rgba(212, 96, 58, 0.35) !important;
  }
  /* Empty state glow */
  .empty-state::before {
    background: radial-gradient(circle, rgba(212, 96, 58, 0.06) 0%, transparent 70%) !important;
  }
  /* Swipe back indicator */
  .swipe-back-indicator {
    background: rgba(250, 248, 245, 0.92) !important;
  }
  .swipe-back-indicator.ready {
    background: rgba(212, 96, 58, 0.1) !important;
  }
  /* Scrollbar */
  ::-webkit-scrollbar-thumb {
    background: var(--border) !important;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: var(--text3) !important;
  }
}

  
/* ── Onboarding guide ── */
.onboarding-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(6px);
  z-index: 10000;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.onboarding-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px 24px;
  max-width: 340px;
  width: 100%;
  text-align: center;
  animation: postcard-arrive 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
.onboarding-emoji { font-size: 48px; margin-bottom: 12px; }
.onboarding-title {
  font-size: 20px; font-weight: 700;
  color: var(--text); margin: 0 0 8px;
}
.onboarding-desc {
  font-size: 14px; color: var(--text2);
  line-height: 1.6; margin: 0 0 20px;
}
.onboarding-features {
  text-align: left; margin-bottom: 24px;
}
.onboarding-feature {
  font-size: 14px; color: var(--text);
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  line-height: 1.5;
}
.onboarding-feature:last-child { border-bottom: none; }
.onboarding-btn {
  background: var(--accent); color: white;
  border: none; border-radius: 12px;
  padding: 12px 32px; font-size: 15px;
  font-weight: 600; cursor: pointer;
  transition: opacity 0.2s;
  width: 100%;
}
.onboarding-btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
<div class="swipe-back-indicator" id="swipeBackIndicator">
  <span class="swipe-back-arrow">‹</span>
</div>


<!-- Top bar -->
<div class="topbar">
  <div class="agent-avatar" id="agentEmoji">🦐</div>
  <div class="agent-info">
    <div class="agent-name" id="agentName">虾游</div>
    <div class="agent-status">
      <span class="mood-badge mood-normal" id="moodBadge">🦐 探索中</span>
      <span id="lastActiveText" style="margin-left:6px;font-size:11px;color:var(--text3)"></span>
    </div>
  </div>
  <div class="topbar-actions">
    <div class="conn-dot disconnected" id="connDot" title="实时连接状态"></div>

    <div class="user-chip" id="userChip" onclick="logout()" title="点击退出登录">
      <span id="userNameDisplay">—</span>
      <span style="font-size:10px">↩</span>
    </div>
  </div>
</div>

<!-- Message feed -->
<div class="messages" id="msgFeed">
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="empty-emoji">🦐</div>
    <div class="empty-title">虾游正在出发...</div>
    <div class="empty-desc">你的专属知识探索龙虾正在海里游荡，寻找值得寄回来的发现。<br><br>💡 试试跟虾游说说你最近对什么感兴趣</div>
    <button class="btn-explore-cta" id="exploreCta" onclick="triggerExplore()">
      🔭 让虾游出发探索
    </button>
  </div>
</div>

<!-- Input -->
<div class="input-area">
  <div class="input-box">
    <textarea id="msgInput" rows="1" placeholder="给虾游发消息，或告诉它去探索某个方向…"
      oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
  </div>
  <button class="explore-mini-btn" id="exploreMiniBtn" onclick="triggerExplore()" title="让虾游探索">🔭</button>
  <button class="send-btn" id="sendBtn" onclick="sendMsg()" title="发送 (Enter)">➤</button>
</div>

<script>
const TOKEN = localStorage.getItem('wanderclaw_token');
let currentUser = null;
let sseSource = null;
let allMessages = [];

// ── Boot ──
(async () => {
  if (!TOKEN) { injectDemoMessages(); return; }
  try {
    const r = await fetch('/api/auth/me', authHeaders());
    if (!r.ok) { location.href = '/login'; return; }
    currentUser = await r.json();
  } catch {
    // Dev mode / no backend: show demo
    const stored = localStorage.getItem('wanderclaw_user');
    if (stored) { currentUser = JSON.parse(stored); }
    else { injectDemoMessages(); return; }
  }

  renderUserInfo();
  await loadMessages();
  connectSSE();
  updateMood();
  setInterval(updateMood, 60000);
})();

function authHeaders() {
  return { headers: { Authorization: 'Bearer ' + TOKEN, 'Content-Type': 'application/json' } };
}

// ── User info ──
function renderUserInfo() {
  if (!currentUser) return;
  document.getElementById('agentEmoji').textContent = currentUser.agent_emoji || '🦐';
  document.getElementById('agentName').textContent = currentUser.agent_name || '虾游';
  document.getElementById('userNameDisplay').textContent = currentUser.user_name || '—';

  // Mood badge updated via updateMood() API call; set default here
  const badge = document.getElementById('moodBadge');
  if (badge) {
    badge.textContent = '🦐 探索中';
    badge.className = 'mood-badge mood-normal';
  }
}

// ── Load history ──
async function loadMessages() {
  try {
    const r = await fetch('/api/messages?limit=100', authHeaders());
    if (!r.ok) return;
    allMessages = await r.json();
    renderAll();
  } catch {
    injectDemoMessages();
  }
}

function renderAll() {
  const feed = document.getElementById('msgFeed');
  // Remove existing messages (keep empty state)
  feed.querySelectorAll('.msg-wrap,.postcard-wrap,.typing-wrap,.system-msg-wrap').forEach(e => e.remove());

  if (!allMessages.length) {
    document.getElementById('emptyState').style.display = 'flex';
    return;
  }
  document.getElementById('emptyState').style.display = 'none';

  allMessages.forEach(msg => appendMsgEl(msg, false));
  scrollToBottom(false);
}

// ── Render a single message ──
function appendMsgEl(msg, animate = true) {
  const feed = document.getElementById('msgFeed');

  // DOM-level dedup: never render the same message ID twice
  if (msg.id && feed.querySelector(`[data-msg-id="${CSS.escape(msg.id)}"]`)) return;

  // Remove empty state
  document.getElementById('emptyState').style.display = 'none';

  let el;
  if (msg.type === 'postcard') {
    el = renderPostcard(msg);
  } else if (msg.type === 'system') {
    el = renderSystem(msg);
  } else {
    el = renderBubble(msg);
  }
  if (msg.id) el.setAttribute('data-msg-id', msg.id);
  feed.appendChild(el);

  if (animate) {
    el.classList.add('arriving');
    el.addEventListener('animationend', () => el.classList.remove('arriving'), { once: true });
    scrollToBottom(true);
  }
}

function renderBubble(msg) {
  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${msg.from === 'user' ? 'from-user' : 'from-agent'}`;
  const row = document.createElement('div');
  row.className = 'bubble-row';
  if (msg.from === 'agent') {
    const av = document.createElement('div');
    av.className = 'avatar';
    av.textContent = currentUser?.agent_emoji || '🦐';
    row.appendChild(av);
  }
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.textContent = msg.content;
  row.appendChild(bub);
  wrap.appendChild(row);
  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = formatTime(msg.timestamp);
  wrap.appendChild(time);
  return wrap;
}

// ── Direction palettes & emojis (shared with archive page) ──
const PC_PALETTES = {
  'AI Agent':['#667eea','#764ba2'],'具身智能':['#36d1dc','#5b86e5'],
  '生物科技':['#11998e','#38ef7d'],'产品设计':['#f7971e','#ffd200'],
  '半导体':['#e94560','#0f0c29'],'全球科技':['#2193b0','#6dd5ed'],
  '医疗健康':['#56ab2f','#a8e063'],'自动驾驶':['#373b44','#4286f4'],
  '基础科学':['#4e54c8','#8f94fb'],'科技财经':['#c94b4b','#4b134f'],
  '气候能源':['#134e5e','#71b280'],'网络安全':['#141e30','#243b55'],
};
const PC_EMOJIS = {
  'AI Agent':'🤖','具身智能':'🦾','生物科技':'🧬','产品设计':'🎨',
  '半导体':'⚡','全球科技':'🌐','医疗健康':'💊','自动驾驶':'🚗',
  '基础科学':'🔬','科技财经':'💹','气候能源':'🌏','网络安全':'🔐',
};
function pcColors(dir) {
  const key = Object.keys(PC_PALETTES).find(k => (dir||'').includes(k));
  return key ? PC_PALETTES[key] : ['#667eea','#764ba2'];
}
function pcEmoji(dir) {
  const key = Object.keys(PC_EMOJIS).find(k => (dir||'').includes(k));
  return key ? PC_EMOJIS[key] : '🌊';
}

function renderPostcard(msg) {
  // Normalise metadata: support both old {metadata:{score,direction}} and new {score,direction}
  const meta   = msg.metadata || {};
  const score  = msg.score ?? meta.score ?? 0;
  const dir    = msg.direction ?? meta.direction ?? '';
  const num    = msg.postcard_id ?? meta.postcard_num ?? null;
  const numStr = num ? String(num).padStart(3,'0') : '???';
  const scoreClass = score >= 8.5 ? 'score-high' : score >= 7 ? 'score-mid' : 'score-low';
  const [c1, c2] = pcColors(dir);
  const emoji  = pcEmoji(dir);

  // Clean body text: strip header line, handle links
  let body = escHtml(msg.content)
    .replace(/^🦐 明信片 #\d+\s*\n*/m, '')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/🔗\s*(https?:\/\/\S+)/g,
      '🔗 <a href="$1" target="_blank" rel="noopener" onclick="event.stopPropagation()">阅读原文 ↗</a>')
    .replace(/\n/g, '<br>');

  const wrap = document.createElement('div');
  wrap.className = 'postcard-wrap';
  wrap.innerHTML = `
    <div class="pc-slot">
      <div class="pc-inner" id="pci-${msg.id}">
        <div class="pc-front" onclick="flipPc('${msg.id}')">
          <div class="pc-front-placeholder" style="background:linear-gradient(135deg,${c1},${c2})">
            <div class="pc-emoji">${emoji}</div>
            <div class="pc-flip-hint">↺ 查看内容</div>
          </div>
          ${score ? `<div class="pc-score-badge ${scoreClass}">${score}分</div>` : ''}
          <div class="pc-front-meta">
            <span class="pc-front-num">#${numStr}</span>
            <span class="pc-front-dir">${dir || '知识探索'}</span>
          </div>
        </div>
        <div class="pc-back">
          <div class="pc-back-scroll">
            <div class="pc-back-header">🦐 明信片 #${numStr}</div>
            <div class="pc-back-text">${body}</div>
          </div>
          <div class="pc-back-footer">
            <span class="pc-back-ts">${formatTime(msg.timestamp)}</span>
            <a href="/archive" class="pc-archive-link">在档案馆查看 →</a>
          </div>
        </div>
      </div>
    </div>`;
  return wrap;
}

function flipPc(id) {
  const el = document.getElementById('pci-' + id);
  if (el) {
    el.classList.toggle('flipped');
    // Add touch-active class for visual feedback
    el.classList.add('touch-active');
    setTimeout(() => el.classList.remove('touch-active'), 300);
  }
}

function renderSystem(msg) {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap system-msg';
  const text = document.createElement('div');
  text.className = 'system-text';
  text.textContent = msg.content;
  wrap.appendChild(text);
  return wrap;
}

// ── Send message ──
let _sending = false;
async function sendMsg() {
  if (_sending) return;
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if (!content) return;

  _sending = true;
  input.value = '';
  autoResize(input);

  // Create message ONCE and render ONCE — single source of truth
  const msg = {
    id: 'tmp_' + Date.now(),
    type: 'message', from: 'user', content,
    timestamp: new Date().toISOString()
  };
  allMessages.push(msg);
  appendMsgEl(msg, true);
  showTyping(true);

  try {
    const r = await fetch('/api/send', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
      body: JSON.stringify({ content })
    });
    if (r.ok) {
      const data = await r.json().catch(() => null);
      // Update id in-place if server confirmed
      if (data?.message_id) msg.id = data.message_id;
    }
  } catch { /* network error — message already rendered */ }
  finally {
    _sending = false;
    showTyping(false);
  }
}

function handleKey(e) {
  // e.isComposing = true 时说明输入法正在组合词，此时 Enter 是确认候选词，不发送
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    sendMsg();
  }
}

  try {
    await fetch('/api/explore', {
      method: 'POST',

      body: JSON.stringify({})
    });

  setTimeout(() => {
    if (cta) { cta.disabled = false; cta.textContent = '🔭 让虾游出发探索'; cta.classList.remove('exploring'); }
    if (mini) { mini.disabled = false; mini.classList.remove('exploring'); }

}

// ── SSE ──
function connectSSE() {
  if (sseSource) sseSource.close();
  const url = `/api/stream?token=${encodeURIComponent(TOKEN)}`;
  sseSource = new EventSource(url);

  sseSource.onopen = () => {
    document.getElementById('connDot').classList.remove('disconnected');
  };

  sseSource.onmessage = (e) => {
    try {
      const event = JSON.parse(e.data);
      if ((event.type === 'message' || event.type === 'postcard') && event.data) {
        const incoming = event.data;
        if (incoming.from === 'user') return;
        if (incoming.id && allMessages.some(m => m.id === incoming.id)) return;
        allMessages.push(incoming);
        showTyping(false);
        appendMsgEl(incoming, true);
      } else if (event.type === 'typing') {
        showTyping(event.active);
      } else if (event.type === 'status') {
        updateStatus(event.data);
      }
    } catch {}
  };

  sseSource.onerror = () => {
    document.getElementById('connDot').classList.add('disconnected');
    setTimeout(connectSSE, 5000);
  };
}

// ── Typing indicator ──
let typingEl = null;
function showTyping(show) {
  if (show && !typingEl) {
    typingEl = document.createElement('div');
    typingEl.className = 'typing-wrap';
    typingEl.innerHTML = `<div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    document.getElementById('msgFeed').appendChild(typingEl);
    scrollToBottom(true);
  } else if (!show && typingEl) {
    typingEl.remove();
    typingEl = null;
  }
}

function updateStatus(data) {
  if (data.mood) {
    const badge = document.getElementById('moodBadge');
    if (badge) {
      badge.textContent = data.mood.emoji + ' ' + data.mood.label;
      badge.className = 'mood-badge mood-' + data.mood.level;
    }
  }
  if (data.last_exploration) {
    document.getElementById('lastActiveText').textContent = '上次探索 ' + formatTime(data.last_exploration);
  }
}

// ── Mood badge ──
async function updateMood() {
  try {
    const resp = await fetch('/api/user/profile', {
      headers: { Authorization: 'Bearer ' + TOKEN }
    });
    if (!resp.ok) return;
    const data = await resp.json();
    const mood = data.mood || { emoji: '🦐', label: '探索中', level: 'normal' };
    const badge = document.getElementById('moodBadge');
    if (badge) {
      badge.textContent = mood.emoji + ' ' + mood.label;
      badge.className = 'mood-badge mood-' + mood.level;
    }
  } catch {}
}

// ── Logout ──
function logout() {
  if (!confirm('确认退出登录？')) return;
  localStorage.removeItem('wanderclaw_token');
  localStorage.removeItem('wanderclaw_user');
  fetch('/api/auth/logout', { method: 'POST', headers: { Authorization: 'Bearer ' + TOKEN } }).catch(() => {});
  location.href = '/login';
}

// ── Utils ──
function scrollToBottom(smooth) {
  const feed = document.getElementById('msgFeed');
  feed.scrollTo({ top: feed.scrollHeight, behavior: smooth ? 'smooth' : 'auto' });
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return Math.floor(diff / 60000) + ' 分钟前';
  if (d.toDateString() === now.toDateString()) {
    return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  }
  return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }) + ' ' +
         d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Swipe back gesture ──
(function() {
  let startX = 0, startY = 0, startTime = 0, tracking = false;
  const indicator = document.getElementById('swipeBackIndicator');
  const body = document.body;
  const EDGE = 30, THRESHOLD = 80, FAST_THRESHOLD = 120, SPEED = 0.3, DAMPING = 0.4;

  document.addEventListener('touchstart', function(e) {
    const touch = e.touches[0];
    if (touch.clientX > EDGE) return;
    if (e.target.closest('.pc-inner, .pc-card, .pc-front, .pc-back')) return;
    startX = touch.clientX;
    startY = touch.clientY;
    startTime = Date.now();
    tracking = true;
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (!tracking) return;
    const touch = e.touches[0];
    const dx = touch.clientX - startX;
    const dy = touch.clientY - startY;
    if (Math.abs(dy) > Math.abs(dx) * 0.6) { tracking = false; indicator.classList.remove('visible','ready'); body.style.transform = ''; return; }
    if (dx < 0) return;
    const offset = dx * DAMPING;
    body.style.transform = 'translateX(' + offset + 'px)';
    body.style.transition = 'none';
    indicator.classList.add('visible');
    if (dx >= THRESHOLD) {
      indicator.classList.add('ready');
    } else {
      indicator.classList.remove('ready');
    }
  }, { passive: true });

  document.addEventListener('touchend', function(e) {
    if (!tracking) return;
    tracking = false;
    const touch = e.changedTouches[0];
    const dx = touch.clientX - startX;
    const elapsed = Date.now() - startTime;
    const speed = dx / elapsed;
    const triggered = dx >= FAST_THRESHOLD || (dx >= THRESHOLD && speed >= SPEED);
    
    if (triggered) {
      body.style.transition = 'transform 0.25s ease-out';
      body.style.transform = 'translateX(100%)';
      setTimeout(function() { window.location.href = '/archive'; }, 200);
    } else {
      body.style.transition = 'transform 0.2s ease-out';
      body.style.transform = '';
    }
    indicator.classList.remove('visible', 'ready');
  }, { passive: true });
})();
